<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ตัวสร้างคันชัก</title>
<style>
body{
    font-family:sans-serif;
    max-width:900px;
    margin:auto;
    padding:20px;
}
textarea{
    width:100%;
    height:200px;
}
#output{
    white-space:pre-wrap;
    border:1px solid #ccc;
    padding:10px;
    margin-top:10px;
    min-height:200px;
}
</style>
</head>
<body>

<h2>ตัวสร้างคันชัก</h2>

<textarea id="input">
---- ---- -5-3 2123 ---- -1*-2* 1*-3* -2*2*2*
---5 -555 6535 -6-1* ---1* -1*1*1* -5-3 21-2
</textarea>

<br><br>
<button onclick="processText()">แปลง</button>

<h3>ผลลัพธ์</h3>
<button onclick="navigator.clipboard.writeText(document.getElementById('output').innerText);alert('copy to clipboard!')">
    📋 คัดลอก
    </button>
<div id="output"></div>

<script>

function processText(){

    let text = document.getElementById("input").value;

    let patterns = [

        // ==========================
        // TEMPLATE สำหรับเพิ่ม pattern ใหม่
        // ==========================
        {
            name: "---- ---x ---- -x-x",
            regex: /---- ---(\d\*?) ---- -(\d\*?)-(\d\*?)/g,
            replace: "---- ---$1} ---- -$2}-$3{"
        },

        {
            name: "xxxx xx-x",
            regex: /(\d\*?)(\d\*?)(\d\*?)(\d\*?) (\d\*?)(\d\*?)-(\d\*?)/g,
            replace: "$1$2$3$4{ $5{$6}-$7{"
        },
        
        {
            name: "---x --xx",
            regex: /---(\d\*?) --(\d\*?)(\d\*?)/g,
            replace: "---$1} --$2}$3{"
        },

        {
            name: "--xx xx-x",
            regex: /--(\d\*?)(\d\*?) (\d\*?)(\d\*?)-(\d\*?)/g,
            replace: "--$1$2{ $3{$4}-$5{"
        },

        

        {
            name: "xx-x",
            regex: /(\d\*?)(\d\*?)-(\d\*?)/g,
            replace: "$1{$2}-$3{"
        },


        {
            name: "---x -xxx",
            regex: /---(\d\*?) -(\d\*?)(\d\*?)(\d\*?)/g,
            replace: "---$1} -$2{$3}$4{"
        },

        {
            name: "-xxx",
            regex: /-(\d\*?)(\d\*?)(\d\*?)/g,
            replace: "-$1}$2}$3{"
        },
        
        {
            name: "---x xxxx",
            regex: /---(\d\*?) (\d\*?)(\d\*?)(\d\*?)(\d\*?)/g,
            replace: "---$1} $2}$3$4$5"
        },
        {
            name: "-x-x",
            regex: /-(\d\*?)-(\d\*?)/g,
            replace: "-$1}-$2{"
        },
        // เพิ่ม pattern ใหม่ด้านล่างได้เลย
        /*
        {
            name: "example",
            regex: /.../g,
            replace: "..."
        }
        */

    ];

    let result = text;

    //ลบคันชักเดิม
    result = result.replace(/[{}]/g, "");

     console.log(result);
    patterns.forEach(pattern=>{
        result = result.replace(
            pattern.regex,
            pattern.replace
        );
    });
    // แก้โน้ต 8, 9
    result = result.replace(/8/g, "1*");
    result = result.replace(/9/g, "2*");

    // ย้าย * ออกมาหน้า { หรือ }
    result = result.replace(/(\*+)(})/g, "$2$1");
    result = result.replace(/(\*+)({)/g, "$2$1");

    document.getElementById("output").textContent = result;
}

processText();

</script>

</body>
</html>
