<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <title>ตัวช่วยเขียนโน้ตขิม</title>
    <style>
        .table-set {
            margin-bottom: 30px;
        }

        .grid {
            border: 1px solid;
            border-collapse: collapse;
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 5px;
        }

        .cell {
            border: 1px solid;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 3px;
        }

        .cell input {
            width: 45%;
            margin: 2px;
        }
    </style>
</head>

<body>

    <h3>กำหนดจำนวนตาราง</h3>
    <input type="number" id="tableCount" value="1" min="1">
    <button onclick="generateTables()">ลบ=สร้างตารางใหม่</button>
    <button onclick="saveData()">แปลงเป็นตัวโน้ต</button>
    <br><br>
    <textarea id="output" rows="10" style="width:50%;"></textarea>
    <div id="container" style="width:50%;"></div>
<pre>
ปุ่มลัด
e = เลื่อนขึ้น
d = เลื่อนลง
f = เลื่อนไปทางซ้าย
s = เลื่อนไปทางขวา
r = ล้างข้อความและใส่เครื่องหมาย - ลงในช่องปัจจุบัน
</pre>
    <script>
        function generateTables() {
            const container = document.getElementById("container");
            container.innerHTML = "";

            const count = parseInt(document.getElementById("tableCount").value);

            for (let t = 0; t < count; t++) {

                const tableSet = document.createElement("div");
                tableSet.className = "table-set";

                const title = document.createElement("h4");
                title.textContent = "ตารางบรรทัดที่ " + (t + 1);

                const grid = document.createElement("div");
                grid.className = "grid";

                // 3 แถว × 8 คอลัมน์ = 24 ช่อง
                for (let i = 0; i < 24; i++) {
                    const cell = document.createElement("div");
                    cell.className = "cell";

                    // input 4 ช่องต่อ cell
                    for (let j = 0; j < 4; j++) {
                        const input = document.createElement("input");
                        input.type = "text";
                        input.value = "-";
                        input.placeholder = `#${j+1}`;

                        // 👇 บันทึกทุกครั้งที่พิมพ์
                        input.addEventListener("input", saveToLocal);

                        cell.appendChild(input);
                    }

                    grid.appendChild(cell);
                }

                tableSet.appendChild(title);
                tableSet.appendChild(grid);
                container.appendChild(tableSet);
            }
            setupArrowNavigation();
        }

        generateTables();
        loadFromLocal();

        function getFrequencyByRow(note, index) {

let freq = noteFreq[note];

if (!freq) return null;

const rowSize = 8 * 4;
const row = Math.floor(index / rowSize);
console.log(row);
// ===== ROW 1 =====
if (row === 0 || 3) {
    if (["1", "2", "3", "4", "5", "j"].includes(note)) {
        freq *= 2;
    }
}

// ===== ROW 2 =====
if (row === 1 || 4) {
    if (["1", "2", "3"].includes(note)) {
        freq *= 2;
    }
}

// ===== ROW 3 =====
if (row === 2 || 5) {
    if (["6", "7"].includes(note)) {
        freq /= 2;
    }
}

return freq;
}


function playCurrentInputSound(input, index) {

const note = input.value.trim();

const freq = getFrequencyByRow(note, index);

if (freq) {
    playSound(freq);
}
}

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSound(freq) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = "sine";
    osc.frequency.value = freq;

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);

    osc.start();

    osc.stop(audioCtx.currentTime + 0.25);
}

function setupArrowNavigation() {
    const inputs = document.querySelectorAll(".cell input");

    inputs.forEach((input, index) => {

        input.addEventListener("keydown", (e) => {
            // ===== NUMBER SOUND =====
if (["1", "2", "3", "4", "5", "6", "7"].includes(e.key)) {

e.preventDefault();

input.value = e.key;

let freq = noteFreq[e.key];

const rowSize = 8 * 4;

// determine row
const row = Math.floor(index / rowSize);

// ===== ROW RULES =====

// row 1
if (row === 0) {
    if (["1", "2", "3", "4", "5",].includes(e.key)) {
        freq *= 2;
    }
}

// row 2
if (row === 1) {
    if (["1", "2", "3"].includes(e.key)) {
        freq *= 2;
    }
}

// row 3
if (row === 2) {
    if (["6", "7"].includes(e.key)) {
        freq /= 2;
    }
}

playSound(freq);

saveToLocal();

return;
}
            let targetIndex = null;

            const rowSize = 8 * 4; // 32 inputs per row

            // ===== WASD MOVE =====
            if (e.key.toLowerCase() === "f") {
                targetIndex = index + 1;
            }
            else if (e.key.toLowerCase() === "g") {
                targetIndex = index + 1;
            }

            else if (e.key.toLowerCase() === "a") {
                targetIndex = index - 1;
            }

            else if (e.key.toLowerCase() === "s") {
                targetIndex = index - 1;
            }
            else if (e.key.toLowerCase() === "c") {
                targetIndex = index - 1;
            }

            else if (e.key.toLowerCase() === "d") {
                targetIndex = index + rowSize;
            }

            else if (e.key.toLowerCase() === "e") {
                targetIndex = index - rowSize;
            }

            else if (e.key.toLowerCase() === "t") {
                targetIndex = index - 31;
            }
            
            else if (e.key.toLowerCase() === "v") {
                targetIndex = index + 33;
                console.log(index);
            }
            // == note
            else if (e.key.toLowerCase() === "j") {
                e.preventDefault();
                input.value = "1";
                saveToLocal();
            }
            else if (e.key.toLowerCase() === "k") {
                e.preventDefault();
                input.value = "2";
                saveToLocal();
            }
            else if (e.key.toLowerCase() === "l") {
                e.preventDefault();
                input.value = "3";
                saveToLocal();
            }
            else if (e.key.toLowerCase() === ";") {
                e.preventDefault();
                input.value = "4";
                saveToLocal();
            }
            else if (e.key.toLowerCase() === "u") {
                e.preventDefault();
                input.value = "5";
                saveToLocal();
            }
            else if (e.key.toLowerCase() === "i") {
                e.preventDefault();
                input.value = "6";
                saveToLocal();
            }
            else if (e.key.toLowerCase() === "o") {
                e.preventDefault();
                input.value = "7";
                saveToLocal();
            }

            // ===== E = CLEAR CURRENT INPUT =====
            else if (e.key.toLowerCase() === "r") {
                e.preventDefault();

                input.select();

                // delete all text
                input.value = "-";

                saveToLocal();
                return;
            }

            // ===== Q = INSERT "-" =====
            else if (e.key.toLowerCase() === "q") {
                e.preventDefault();

                input.value = "-";

                saveToLocal();

                // highlight it
                input.select();
                return;
            } 


            // ===== R = PLAY CURRENT NOTE =====
else if (e.key.toLowerCase() === "r") {

e.preventDefault();

playCurrentInputSound(input, index);

return;
}

            // ===== PLAY NOTE =====
            if (["1","2","3","4","5","6","7"].includes(e.key)) {

input.value = e.key;

playNote(e.key, index);

saveToLocal();

e.preventDefault();
}

            // ===== MOVE =====
            if (targetIndex !== null && inputs[targetIndex]) {
                e.preventDefault();

                inputs[targetIndex].focus();
                inputs[targetIndex].select();
            }

        });

    });
}

        function saveToLocal() {
            const tables = document.querySelectorAll(".table-set");
            let data = [];

            tables.forEach((table) => {
                let tableData = [];
                const inputs = table.querySelectorAll("input");

                inputs.forEach((input) => {
                    tableData.push(input.value);
                });

                data.push(tableData);
            });

            localStorage.setItem("gridData", JSON.stringify(data));
        }

        function loadFromLocal() {
            const data = JSON.parse(localStorage.getItem("gridData"));
            if (!data) return;

            const tables = document.querySelectorAll(".table-set");

            tables.forEach((table, tIndex) => {
                const inputs = table.querySelectorAll("input");

                inputs.forEach((input, i) => {
                    if (data[tIndex] && data[tIndex][i] !== undefined) {
                        input.value = data[tIndex][i];
                    }
                });
            });
        }

        function saveData() {
            const tables = document.querySelectorAll(".table-set");
            let result = "";

            tables.forEach((table, tIndex) => {
                // result += `ตารางที่ ${tIndex + 1}\n`;

                const inputs = table.querySelectorAll(".cell input");

                inputs.forEach((input, i) => {
                    result += input.value;

                    // คั่นค่าใน 1 cell
                    if ((i + 1) % 4 !== 0) {
                        result += "";
                    } else {
                        result += " "; // จบ 1 cell
                    }

                    // ขึ้นบรรทัดใหม่เมื่อครบ 1 แถว (32 input)
                    if ((i + 1) % 32 === 0) {
                        result += "\n";
                    }
                });

                result += "\n";
            });
            const cleaned = result
                .split("\n") // แยกเป็นแต่ละบรรทัด
                .map(line => line.trimEnd()) // ลบช่องว่างท้ายบรรทัด
                .join("\n"); // รวมกลับ

            const finalText = transformResult(cleaned);
            document.getElementById("output").value = finalText;
        }

        function transformResult(text) {
            const tables = text.split(/\n\s*\n/); // 👈 แยกด้วยบรรทัดว่าง
            console.log(tables);
            return tables.map(table => {
                const lines = table.split("\n");

                return lines.map((line, rowIndex) => {
                    if (!line.trim()) return line;

                    let cells = line.split(" ").map(cell => cell.trim());

                    cells = cells.map(cell => {
                        let nums = cell.split("").map(n => n.trim());

                        nums = nums.map(n => {
                            if (n === "-") return n;

                            // 🔹 แถวที่ 1
                            if (rowIndex === 0) {
                                if (["1", "2", "3", "4", "5"].includes(n)) return n +
                                    "*";
                            }

                            // 🔹 แถวที่ 2
                            if (rowIndex === 1) {
                                if (["1", "2", "3"].includes(n)) return n + "*";
                            }

                            // 🔹 แถวที่ 3
                            if (rowIndex === 2) {
                                if (["6", "7"].includes(n)) return n + ".";
                            }

                            return n;
                        });

                        return nums.join("");
                    });

                    return cells.join(" ");
                }).join("\n");

            }).join("\n\n"); // 👈 คงบรรทัดว่างคั่นเหมือนเดิม
        }

// ===== NOTE FREQUENCIES =====
const noteFreq = {
    "1": 466.16,
    "2": 523.25,
    "3": 587.33,
    "4": 622.25,
    "5": 698.46,
    "6": 783.99,
    "7": 880.00
};

// ===== PLAY SOUND =====
function playNote(num, inputIndex) {

    if (!noteFreq[num]) return;

    const rowSize = 8 * 4; // 32 inputs per row
    const row = Math.floor(inputIndex / rowSize);

    let freq = noteFreq[num];

    // ===== ROW RULES =====

    // row 1
    if (row === 0 && ["1","2","3","4","5"].includes(num)) {
        freq *= 2;
    }

    // row 2
    if (row === 1 && ["1","2","3"].includes(num)) {
        freq *= 2;
    }

    // row 3
    if (row === 2 && ["6","7"].includes(num)) {
        freq /= 2;
    }

    // ===== AUDIO =====
    const ctx = new (window.AudioContext || window.webkitAudioContext)();

    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.type = "sine";
    osc.frequency.value = freq;

    gain.gain.value = 0.15;

    osc.connect(gain);
    gain.connect(ctx.destination);

    osc.start();

    setTimeout(() => {
        osc.stop();
        ctx.close();
    }, 180);
}
    </script>

</body>

</html>
